<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>QrHub</title>
  <!--
    GitHub Pages 404 → SPA redirect hack (only needed for BrowserRouter).
    With HashRouter this file is not strictly required but kept as a safety net.
  -->
  <script>
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 2).join('/') +
      '/?/' + l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
