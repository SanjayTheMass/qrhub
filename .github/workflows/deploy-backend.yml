name: Deploy Backend → Render

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  trigger-render:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        # Add RENDER_DEPLOY_HOOK_URL to GitHub repo secrets:
        # Render Dashboard → Service → Settings → Deploy Hook → copy URL
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Render deploy triggered ✓"

